{% extends "base.html" %}

{% block conteudo %}

<h2 class="mb-4">✏️ Editar Cliente</h2>

<div class="card">
    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input
                    type="text"
                    name="nome"
                    class="form-control"
                    value="{{ cliente[1] }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Telefone</label>
                <input
                    type="text"
                    name="telefone"
                    class="form-control"
                    value="{{ cliente[2] }}"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">
                💾 Salvar Alterações
            </button>

            <a href="/clientes" class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>
</div>

{% endblock %}
