{% extends "base.html" %}

{% block conteudo %}

<h2>{{ titulo }}</h2>

<table class="table table-striped table-hover">

    <thead class="table-dark">
        <tr>
            <th>Data</th>
            <th>Valor</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>

    {% for compra in compras %}

    <tr>
        <td>{{ compra[0] }}</td>
        <td>R$ {{ compra[1] }}</td>
        <td>{{ compra[2] }}</td>
    </tr>

    {% endfor %}

    </tbody>

</table>

<a href="/relatorios" class="btn btn-secondary">
    ⬅ Voltar
</a>

{% endblock %}
